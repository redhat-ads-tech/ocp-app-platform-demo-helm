apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: continue-config
  namespace: {{ include "devspaces-instance.namespace" . }}
  annotations:
    {{- include "devspaces-instance.argocd-syncwave" . | nindent 4 }}
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: continue-config
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: che.eclipse.org
          app.kubernetes.io/component: workspaces-config
        annotations:
          controller.devfile.io/mount-as: subpath
          controller.devfile.io/mount-path: /home/user/.continue-config/
      data:
        config.yaml: |
          name: Continue Config
          version: 0.0.1
          models:
            - name: LiteMaaS (claude-opus-4-6)
              provider: vllm
              model: claude-opus-4-6
              apiKey: {{ printf "{{ .api_key }}" }}
              apiBase: {{ printf "{{ .base_url }}" }}
              roles:
                - chat
  data:
    - secretKey: api_key
      remoteRef:
        key: secrets/litellm/credentials
        property: api_key
    - secretKey: base_url
      remoteRef:
        key: secrets/litellm/credentials
        property: base_url
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: roo-config
  namespace: {{ include "devspaces-instance.namespace" . }}
  annotations:
    {{- include "devspaces-instance.argocd-syncwave" . | nindent 4 }}
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: roo-config
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: che.eclipse.org
          app.kubernetes.io/component: workspaces-config
        annotations:
          controller.devfile.io/mount-as: subpath
          controller.devfile.io/mount-path: /home/user/.roo-config
      data:
        roo-code-settings.json: |
          {
            "providerProfiles": {
              "currentApiConfigName": "default",
              "apiConfigs": {
                "default": {
                  "openAiBaseUrl": "{{ printf "{{ .base_url }}" }}",
                  "openAiApiKey": "{{ printf "{{ .api_key }}" }}",
                  "openAiModelId": "claude-opus-4-6",
                  "openAiCustomModelInfo": {
                    "maxTokens": -1,
                    "contextWindow": 262144,
                    "supportsImages": false,
                    "supportsPromptCache": true,
                    "inputPrice": 0,
                    "outputPrice": 0
                  },
                  "openAiHeaders": {},
                  "apiProvider": "openai",
                  "id": "default"
                }
              },
              "modeApiConfigs": {
                "architect": "default",
                "code": "default",
                "ask": "default",
                "debug": "default",
                "orchestrator": "default"
              },
              "migrations": {
                "rateLimitSecondsMigrated": true,
                "openAiHeadersMigrated": true,
                "consecutiveMistakeLimitMigrated": true,
                "todoListEnabledMigrated": true,
                "claudeCodeLegacySettingsMigrated": true
              }
            },
            "globalSettings": {
              "dismissedUpsells": ["longRunningTask"],
              "autoApprovalEnabled": true,
              "alwaysAllowReadOnly": true,
              "alwaysAllowReadOnlyOutsideWorkspace": true,
              "alwaysAllowWrite": false,
              "alwaysAllowWriteOutsideWorkspace": false,
              "alwaysAllowWriteProtected": false,
              "writeDelayMs": 1000,
              "alwaysAllowMcp": false,
              "alwaysAllowModeSwitch": false,
              "alwaysAllowSubtasks": true,
              "alwaysAllowExecute": false,
              "alwaysAllowFollowupQuestions": false,
              "followupAutoApproveTimeoutMs": 60000,
              "allowedCommands": ["git log", "git diff", "git show"],
              "deniedCommands": [],
              "autoCondenseContext": true,
              "autoCondenseContextPercent": 100,
              "includeDiagnosticMessages": true,
              "maxDiagnosticMessages": 50,
              "enableCheckpoints": true,
              "checkpointTimeout": 15,
              "maxOpenTabsContext": 20,
              "maxWorkspaceFiles": 200,
              "showRooIgnoredFiles": false,
              "terminalShellIntegrationDisabled": true,
              "terminalZshClearEolMark": true,
              "mcpEnabled": true,
              "mode": "code",
              "telemetrySetting": "unset",
              "language": "en"
            }
          }
  data:
    - secretKey: api_key
      remoteRef:
        key: secrets/litellm/credentials
        property: api_key
    - secretKey: base_url
      remoteRef:
        key: secrets/litellm/credentials
        property: base_url
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: workspace-env-credentials
  namespace: {{ include "devspaces-instance.namespace" . }}
  annotations:
    {{- include "devspaces-instance.argocd-syncwave" . | nindent 4 }}
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: workspace-env-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: che.eclipse.org
          app.kubernetes.io/component: workspaces-config
        annotations:
          controller.devfile.io/mount-as: env
      data:
        LLM_API_KEY: "{{ printf "{{ .api_key }}" }}"
        LLM_BASE_URL: "{{ printf "{{ .base_url }}" }}"
        # Required by the Claude Code VS Code extension to connect to a
        # vLLM-hosted model via the Anthropic-compatible API.
        # See: https://docs.vllm.ai/en/stable/serving/integrations/claude_code/
        ANTHROPIC_BASE_URL: "{{ printf "{{ .base_url }}" }}"
        ANTHROPIC_API_KEY: "{{ printf "{{ .api_key }}" }}"
        ANTHROPIC_MODEL: "claude-opus-4-6"
        DEV_KAFKA_PASSWORD: "{{ printf "{{ .kafka_password }}" }}"
  data:
    - secretKey: api_key
      remoteRef:
        key: secrets/litellm/credentials
        property: api_key
    - secretKey: base_url
      remoteRef:
        key: secrets/litellm/credentials
        property: base_url
    - secretKey: kafka_password
      remoteRef:
        key: secrets/kafka/user-password
        property: value
